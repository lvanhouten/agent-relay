<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing scale" subtitle="4px base grid · --space-1 → --space-16" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; background:var(--surface-card); padding:22px; display:flex; align-items:flex-end; gap:16px; }
  .col { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .bar { background:var(--accent); border-radius:var(--radius-xs); width:22px; }
  .t { font-family:var(--font-mono); font-size:10px; color:var(--text-muted); }
  .px { font-family:var(--font-mono); font-size:9px; color:var(--text-faint); }
</style></head>
<body>
  <div class="col"><div class="bar" style="height:var(--space-1)"></div><span class="t">1</span><span class="px">4</span></div>
  <div class="col"><div class="bar" style="height:var(--space-2)"></div><span class="t">2</span><span class="px">8</span></div>
  <div class="col"><div class="bar" style="height:var(--space-3)"></div><span class="t">3</span><span class="px">12</span></div>
  <div class="col"><div class="bar" style="height:var(--space-4)"></div><span class="t">4</span><span class="px">16</span></div>
  <div class="col"><div class="bar" style="height:var(--space-6)"></div><span class="t">6</span><span class="px">24</span></div>
  <div class="col"><div class="bar" style="height:var(--space-8)"></div><span class="t">8</span><span class="px">32</span></div>
  <div class="col"><div class="bar" style="height:var(--space-12)"></div><span class="t">12</span><span class="px">48</span></div>
  <div class="col"><div class="bar" style="height:var(--space-16)"></div><span class="t">16</span><span class="px">64</span></div>
</body></html>
