<!-- @dsCard group="Type" viewport="700x230" name="Display scale" subtitle="Space Grotesk · headings & display sizes" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; background:var(--surface-card); padding:22px; }
  .row { display:flex; align-items:baseline; gap:16px; padding:7px 0; border-bottom:1px solid var(--border-subtle); }
  .row:last-child { border:0; }
  .meta { font-family:var(--font-mono); font-size:10px; color:var(--text-faint); width:120px; flex-shrink:0; }
  .spec { font-family:var(--font-display); color:var(--text-strong); letter-spacing:var(--tracking-tight); line-height:1.1; }
</style></head>
<body>
  <div class="row"><span class="meta">5xl · 64 / 700</span><span class="spec" style="font-size:var(--text-5xl);font-weight:700">relay</span></div>
  <div class="row"><span class="meta">3xl · 36 / 600</span><span class="spec" style="font-size:var(--text-3xl);font-weight:600">Connect to any session</span></div>
  <div class="row"><span class="meta">2xl · 28 / 600</span><span class="spec" style="font-size:var(--text-2xl);font-weight:600">Active sessions on main</span></div>
  <div class="row"><span class="meta">xl · 22 / 500</span><span class="spec" style="font-size:var(--text-xl);font-weight:500">Resume where you left off</span></div>
</body></html>
