<!-- @dsCard group="Brand" viewport="700x180" name="The signal motif" subtitle="Pulsing relay dot — the brand's connection metaphor" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:0; display:flex; }
  .pane { flex:1; padding:26px; background:var(--gray-950); display:flex; align-items:center; gap:30px; }
  .signal { display:flex; align-items:center; gap:14px; }
  .dot { position:relative; width:12px; height:12px; border-radius:50%; background:var(--relay-400); }
  .dot::after { content:""; position:absolute; inset:0; border-radius:50%; background:var(--relay-400);
    animation:pulse 1.8s cubic-bezier(.22,1,.36,1) infinite; }
  @keyframes pulse { 0%{transform:scale(1);opacity:.6} 70%{transform:scale(3);opacity:0} 100%{opacity:0} }
  .txt { font-family:var(--font-mono); font-size:12px; letter-spacing:.12em; text-transform:uppercase; color:var(--relay-300); }
  .arcs { margin-left:auto; }
  .cap { font-family:var(--font-mono); font-size:11px; color:#7f888e; max-width:230px; line-height:1.6; }
</style></head>
<body>
  <div class="pane">
    <div class="signal"><span class="dot"></span><span class="txt">session online</span></div>
    <p class="cap">Green means a live link to your machine. The pulse is the relay heartbeat — used on dots, status rows, and the logo arcs.</p>
    <svg class="arcs" width="64" height="64" viewBox="0 0 48 48" fill="none">
      <circle cx="24" cy="24" r="4.5" fill="#1fce8a"/>
      <path d="M13 31.5 A 12 12 0 0 1 13 16.5" stroke="#1fce8a" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M35 16.5 A 12 12 0 0 1 35 31.5" stroke="#54dfa6" stroke-width="2.5" stroke-linecap="round" stroke-opacity="0.8"/>
    </svg>
  </div>
</body></html>
