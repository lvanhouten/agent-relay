<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Core primitives</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { background: var(--surface-app); }
  .wrap { padding: 22px; display: flex; flex-direction: column; gap: 20px; }
  .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .seg { display: flex; flex-direction: column; gap: 10px; }
  .seg > .relay-label { color: var(--text-faint); }
  .divline { height: 1px; background: var(--border-subtle); }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
</style>
</head>
<body data-theme="dark">
<div id="root" class="wrap"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Button, IconButton, Input, Badge, StatusDot, Card, Switch, Kbd } = window.AgentRelayDesignSystem_9f29b7;

  // tiny inline stroke icons (Lucide-style) just for the specimen
  const I = (d) => (p) => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}>{d}</svg>;
  const Plus = I(<><path d="M12 5v14"/><path d="M5 12h14"/></>);
  const Server = I(<><rect x="3" y="4" width="18" height="7" rx="1.5"/><rect x="3" y="13" width="18" height="7" rx="1.5"/><path d="M7 7.5h.01M7 16.5h.01"/></>);
  const Gear = I(<><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-2.82 1.17V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 8 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15H4.5a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 6 9.4l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 11.6 4.6h-.1a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 2.82 1.17l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9z"/></>);
  const Split = I(<><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M12 3v18"/></>);

  function Demo() {
    return (
      <>
        <div className="seg">
          <span className="relay-label">Buttons</span>
          <div className="row">
            <Button>Connect</Button>
            <Button variant="secondary" leadingIcon={<Plus/>}>New session</Button>
            <Button variant="ghost">Cancel</Button>
            <Button variant="danger">Terminate</Button>
            <Button loading>Connecting</Button>
            <Button disabled>Disabled</Button>
          </div>
          <div className="row">
            <Button size="sm">Small</Button>
            <Button size="md">Medium</Button>
            <Button size="lg">Large</Button>
            <IconButton label="Settings" bordered><Gear/></IconButton>
            <IconButton label="Split"><Split/></IconButton>
            <IconButton label="Active" active><Plus/></IconButton>
          </div>
        </div>

        <div className="divline"></div>

        <div className="grid2">
          <div className="seg">
            <span className="relay-label">Inputs</span>
            <Input label="Relay host" mono placeholder="main.local:7070" prefix={<Server/>} defaultValue="main.local:7070" />
            <Input label="Access token" type="password" defaultValue="xxxxxxxxxxxx" error="Token rejected" />
          </div>
          <div className="seg">
            <span className="relay-label">Status &amp; badges</span>
            <div className="row">
              <StatusDot status="online" />
              <StatusDot status="idle" />
              <StatusDot status="offline" />
              <StatusDot status="error" label="lost link" />
            </div>
            <div className="row">
              <Badge variant="accent">zsh</Badge>
              <Badge variant="neutral">pid 48213</Badge>
              <Badge variant="success">attached</Badge>
              <Badge variant="warning">stale</Badge>
              <Badge variant="outline">3 panes</Badge>
            </div>
            <div className="row">
              <Switch label="Auto-reconnect" defaultChecked />
              <Kbd keys={['⌘','K']} />
            </div>
          </div>
        </div>
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
